<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Trikot-Manager">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>SG Bliesen-Winterbach · Trikot-Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f0f0;
    --surface: #ffffff;
    --surface-alt: #f5f5f5;
    --border: rgba(0,0,0,0.13);
    --border-strong: rgba(0,0,0,0.25);
    --text: #111111;
    --text-muted: #636363;
    --accent: #cc0000;
    --accent-bg: #fdecea;
    --accent-text: #990000;
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --warning: #854f0b;
    --warning-bg: #faeeda;
    --danger: #990000;
    --danger-bg: #fdecea;
    --gold: #c9a227;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    background: #111111;
    border-bottom: 3px solid var(--gold);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 16px; font-weight: 500; color: #ffffff; letter-spacing: 0.01em; }
  header .club-sub { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; text-transform: uppercase; }
  nav {
    display: flex;
    gap: 2px;
    margin-left: auto;
  }
  nav button {
    background: none;
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    transition: background 0.15s, color 0.15s;
  }
  nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
  nav button.active { background: var(--accent); color: #fff; font-weight: 500; }
  @media (max-width: 480px) {
    header { padding: 0 1rem; gap: 8px; }
    header h1 { font-size: 14px; }
    nav button { padding: 6px 10px; font-size: 13px; }
    main { padding: 1rem; }
    .card { padding: 1rem; }
    .inline-form { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr 1fr; }
    .match-row { padding: 8px; }
    .modal { padding: 1.25rem; }
  }
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  .page { display: none; }
  .page.active { display: block; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
  h3 { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #0c447c; }
  .btn-danger { color: var(--danger); border-color: var(--danger-bg); }
  .btn-danger:hover { background: var(--danger-bg); }
  .btn-sm { padding: 4px 10px; font-size: 13px; }
  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  input[type="text"], input[type="number"], select {
    width: 100%;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group:last-child { margin-bottom: 0; }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-blue { background: var(--accent-bg); color: var(--accent-text); }
  .badge-green { background: var(--success-bg); color: var(--success); }
  .badge-amber { background: var(--warning-bg); color: var(--warning); }
  .badge-red { background: var(--danger-bg); color: var(--danger); }
  .jersey-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .jersey-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface-alt);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    min-width: 54px;
    font-size: 13px;
    position: relative;
  }
  .jersey-chip .num { font-weight: 500; font-size: 16px; }
  .jersey-chip .size { font-size: 11px; color: var(--text-muted); }
  .jersey-chip .del {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--danger-bg);
    color: var(--danger);
    border: none;
    cursor: pointer;
    font-size: 12px;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .jersey-chip:hover .del { display: flex; }
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .player-row:last-child { border-bottom: none; }
  .player-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent-bg);
    color: var(--accent-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .player-info { flex: 1; }
  .player-name { font-weight: 500; font-size: 14px; }
  .player-meta { font-size: 12px; color: var(--text-muted); }
  .match-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    margin-bottom: 6px;
    background: var(--surface-alt);
  }
  .match-jersey {
    width: 44px; height: 44px;
    border-radius: var(--radius);
    background: var(--accent-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .match-jersey .n { font-size: 18px; font-weight: 500; color: var(--accent-text); }
  .match-jersey .s { font-size: 10px; color: var(--accent-text); opacity: 0.7; }
  .match-jersey.warning-jersey { background: var(--warning-bg); }
  .match-jersey.warning-jersey .n, .match-jersey.warning-jersey .s { color: var(--warning); }
  .match-jersey.none-jersey { background: var(--danger-bg); }
  .match-jersey.none-jersey .n, .match-jersey.none-jersey .s { color: var(--danger); }
  .inline-form {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 8px;
    align-items: end;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }
  .inline-form-jersey {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
    align-items: end;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
  }
  .section-divider {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin: 1.5rem 0 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }
  .player-checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
  }
  .player-checkbox:hover { background: var(--surface-alt); }
  .player-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
  .player-checkbox.selected { background: var(--accent-bg); }
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 10px 14px;
    text-align: center;
  }
  .stat-card .stat-num { font-size: 22px; font-weight: 500; }
  .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stat-card.green .stat-num { color: var(--success); }
  .stat-card.amber .stat-num { color: var(--warning); }
  .stat-card.red .stat-num { color: var(--danger); }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.5rem;
    width: 420px;
    max-width: 92vw;
  }
  .modal h3 { margin-bottom: 1.25rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .set-actions { display: flex; gap: 6px; }
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 3px;
    margin-bottom: 1.5rem;
    width: fit-content;
  }
  .tab-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
    border: 0.5px solid var(--border);
  }
  .sizes-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .size-tag {
    background: var(--surface-alt);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .size-tag.chosen { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }
  .filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .match-result-star { color: #eaad2b; font-size: 16px; }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .inline-form { grid-template-columns: 1fr 1fr; }
    .inline-form .btn { grid-column: span 2; }
    .stats-row { grid-template-columns: 1fr; }
  }
</style>
</head>

<main>

<!-- === TRIKOTSÄTZE === -->
<div id="page-sets" class="page active">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
    <h2 style="margin:0">Trikotsätze</h2>
    <button class="btn btn-primary" onclick="openNewSetModal()">+ Neuer Satz</button>
  </div>
  <div id="sets-list"></div>
</div>

<!-- === SPIELER === -->
<div id="page-vorlagen" class="page">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
    <h2 style="margin:0">Standardaufstellungen</h2>
    <button class="btn btn-primary" onclick="openNewVorlageModal()">+ Neue Vorlage</button>
  </div>
  <div id="vorlagen-list"></div>
</div>

<div id="page-players" class="page">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
    <h2 style="margin:0">Spieler</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn" onclick="exportJSON()">⬇ JSON</button>
      <button class="btn" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn" onclick="downloadCSVTemplate()" title="Leere CSV-Vorlage für Excel">⬇ CSV-Vorlage</button>
      <label class="btn" style="cursor:pointer;">⬆ JSON<input type="file" accept=".json" onchange="importJSON(event)" style="display:none;"></label>
      <label class="btn" style="cursor:pointer;">⬆ CSV<input type="file" accept=".csv,.txt" onchange="importCSV(event)" style="display:none;"></label>
      <button class="btn btn-primary" onclick="openAddPlayerModal()">+ Spieler hinzufügen</button>
    </div>
  </div>
  <div id="players-list"></div>
</div>

<!-- === AUFSTELLUNG === -->
<div id="page-lineup" class="page">
  <h2>Aufstellung & Trikot-Matching</h2>
  <div class="card">
    <h3>Spielinfo <span style="font-size:12px;font-weight:400;color:var(--text-muted);">(optional)</span></h3>
    <div class="form-row" style="margin-bottom:0;">
      <div class="form-group" style="margin:0;">
        <label>Spieldatum</label>
        <input type="date" id="game-date">
      </div>
      <div class="form-group" style="margin:0;">
        <label>Gegner</label>
        <input type="text" id="game-opponent" placeholder="z.B. FC Beispiel">
      </div>
    </div>
  </div>
  <div class="card">
    <h3>1. Trikotsatz wählen</h3>
    <select id="lineup-set-select" onchange="onSetSelected()" style="max-width:300px;">
      <option value="">— Trikotsatz auswählen —</option>
    </select>
    <div id="set-preview" style="margin-top:10px;"></div>
  </div>
  <div class="card" id="players-select-card" style="display:none;">
    <h3>2. Spieler auswählen</h3>
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">
      <select id="vorlage-select" onchange="loadVorlage()" style="flex:1;">
        <option value="">— Vorlage laden —</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <select id="status-filter" onchange="renderPlayerSelect()" style="width:140px;">
        <option value="alle">Alle Spieler</option>
        <option value="aktiv">Nur Aktive</option>
        <option value="inaktiv">Nur Inaktive</option>
      </select>
      <input type="text" id="player-search" placeholder="Spieler suchen…" oninput="renderPlayerSelect()" style="flex:1;margin-bottom:0;">
    </div>
    <div class="filter-row">
      <span style="font-size:13px;color:var(--text-muted);">Aufgestellt:</span>
      <span id="selected-count" class="badge badge-blue">0 Spieler</span>
    </div>
    <div id="players-select-list"></div>
    <div style="margin-top:1rem;display:flex;gap:8px;">
      <button class="btn btn-sm" onclick="selectAll()">Alle auswählen</button>
      <button class="btn btn-sm" onclick="selectNone()">Keine</button>
    </div>
  </div>
  <div id="match-result-card" style="display:none;">
    <div class="card">
      <div class="result-header">
        <h3 style="margin:0">3. Trikot-Matching</h3>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="exportSheet('image')">🖼 Bild</button>
          <button class="btn btn-sm" onclick="exportSheet('pdf')">📄 PDF</button>
          <button class="btn btn-primary btn-sm" onclick="runMatch()">Neu berechnen</button>
        </div>
      </div>
      <div class="stats-row" id="match-stats"></div>
      <div id="match-result-list"></div>
    </div>
  </div>
</div>

</main>

<!-- Modal: Neuer Trikotsatz -->
<div class="modal-overlay" id="modal-set">
  <div class="modal">
    <h3 id="modal-set-title">Neuer Trikotsatz</h3>
    <div class="form-group">
      <label>Name des Satzes</label>
      <input type="text" id="set-name-input" placeholder="z.B. Heimtrikot 2024">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-set')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveSet()">Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Spieler hinzufügen / bearbeiten -->
<div class="modal-overlay" id="modal-player">
  <div class="modal">
    <h3 id="modal-player-title">Spieler hinzufügen</h3>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="player-name-input" placeholder="Vor- und Nachname">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin:0;">
        <label>Trikotsgrößee</label>
        <select id="player-size-input">
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M" selected>M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
          <option value="3XL">3XL</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;">
        <label>Wunschnummer</label>
        <input type="number" id="player-num-input" placeholder="z.B. 10" min="1" max="99">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-player')">Abbrechen</button>
      <button class="btn btn-primary" onclick="savePlayer()">Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Vorlage bearbeiten -->
<div class="modal-overlay" id="modal-vorlage">
  <div class="modal">
    <h3 id="modal-vorlage-title">Neue Vorlage</h3>
    <div class="form-group">
      <label>Name der Vorlage</label>
      <input type="text" id="vorlage-name-input" placeholder="z.B. 1. Mannschaft">
    </div>
    <div class="form-group">
      <label>Spieler</label>
      <div id="vorlage-player-list" style="max-height:280px;overflow-y:auto;border:0.5px solid var(--border);border-radius:var(--radius);padding:6px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-vorlage')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveVorlage()">Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Trikot hinzufügen -->
<div class="modal-overlay" id="modal-jersey">
  <div class="modal">
    <h3>Trikot hinzufügen</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem;" id="modal-jersey-setname"></p>
    <div class="form-row">
      <div class="form-group" style="margin:0;">
        <label>Nummer</label>
        <input type="number" id="jersey-num-input" placeholder="z.B. 9" min="1" max="99">
      </div>
      <div class="form-group" style="margin:0;">
        <label>Größe</label>
        <select id="jersey-size-input">
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
          <option value="3XL">3XL</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-jersey')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveJersey()">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
const SIZES = ['XS','S','M','L','XL','XXL','3XL'];
let db = load();
let editSetId = null, editPlayerId = null, jerseyTargetSetId = null;
let selectedPlayers = new Set();

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('trikot-db') || 'null') || { sets: [], players: [], lineups: [] };
    if (!d.lineups) d.lineups = [];
    return d;
  } catch(e) { return { sets: [], players: [], lineups: [] }; }
}
function save() { localStorage.setItem('trikot-db', JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const btns = document.querySelectorAll('nav button');
  const idx = {sets:0, players:1, vorlagen:2, lineup:3}[name];
  btns[idx].classList.add('active');
  if (name === 'sets') renderSets();
  if (name === 'players') renderPlayers();
  if (name === 'vorlagen') renderVorlagen();
  if (name === 'lineup') renderLineup();
}

// ---- SETS ----
function renderSets() {
  const el = document.getElementById('sets-list');
  if (!db.sets.length) {
    el.innerHTML = '<div class="empty-state">Noch keine Trikotsätze. Lege deinen ersten Satz an.</div>';
    return;
  }
  el.innerHTML = db.sets.map(s => `
    <div class="card">
      <div class="card-header">
        <div>
          <strong style="font-size:15px;">${esc(s.name)}</strong>
          <span style="margin-left:8px;" class="badge badge-blue">${s.jerseys.length} Trikots</span>
        </div>
        <div class="set-actions">
          <button class="btn btn-sm" onclick="openAddJerseyModal('${s.id}')">+ Trikot</button>
          <button class="btn btn-sm" onclick="openEditSetModal('${s.id}')">Bearbeiten</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSet('${s.id}')">Löschen</button>
        </div>
      </div>
      ${s.jerseys.length ? renderJerseyGrid(s) : '<p style="font-size:13px;color:var(--text-muted);">Noch keine Trikots in diesem Satz.</p>'}
    </div>
  `).join('');
}

function renderJerseyGrid(s) {
  const grouped = {};
  s.jerseys.forEach(j => { grouped[j.size] = grouped[j.size] || []; grouped[j.size].push(j); });
  return SIZES.filter(sz => grouped[sz]).map(sz => `
    <div style="margin-bottom:8px;">
      <div class="section-divider">${sz}</div>
      <div class="jersey-grid">
        ${grouped[sz].map(j => `
          <div class="jersey-chip">
            <span class="num">${j.number}</span>
            <span class="size">${j.size}</span>
            <button class="del" onclick="deleteJersey('${s.id}','${j.id}')" title="Entfernen">×</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function openNewSetModal() {
  editSetId = null;
  document.getElementById('modal-set-title').textContent = 'Neuer Trikotsatz';
  document.getElementById('set-name-input').value = '';
  openModal('modal-set');
  setTimeout(() => document.getElementById('set-name-input').focus(), 100);
}
function openEditSetModal(id) {
  editSetId = id;
  const s = db.sets.find(x => x.id === id);
  document.getElementById('modal-set-title').textContent = 'Satz bearbeiten';
  document.getElementById('set-name-input').value = s.name;
  openModal('modal-set');
}
function saveSet() {
  const name = document.getElementById('set-name-input').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  if (editSetId) {
    const s = db.sets.find(x => x.id === editSetId);
    s.name = name;
  } else {
    db.sets.push({ id: uid(), name, jerseys: [] });
  }
  save(); closeModal('modal-set'); renderSets();
}
function deleteSet(id) {
  if (!confirm('Trikotsatz wirklich löschen?')) return;
  db.sets = db.sets.filter(s => s.id !== id);
  save(); renderSets();
}

function openAddJerseyModal(setId) {
  jerseyTargetSetId = setId;
  const s = db.sets.find(x => x.id === setId);
  document.getElementById('modal-jersey-setname').textContent = 'Satz: ' + s.name;
  document.getElementById('jersey-num-input').value = '';
  openModal('modal-jersey');
  setTimeout(() => document.getElementById('jersey-num-input').focus(), 100);
}
function saveJersey() {
  const num = parseInt(document.getElementById('jersey-num-input').value);
  const size = document.getElementById('jersey-size-input').value;
  if (!num || num < 1 || num > 99) { alert('Ungültige Trikotnummer (1–99).'); return; }
  const s = db.sets.find(x => x.id === jerseyTargetSetId);
  if (s.jerseys.find(j => j.number === num)) { alert('Diese Nummer existiert bereits in diesem Satz.'); return; }
  s.jerseys.push({ id: uid(), number: num, size });
  s.jerseys.sort((a,b) => a.number - b.number);
  save(); closeModal('modal-jersey'); renderSets();
}
function deleteJersey(setId, jerseyId) {
  const s = db.sets.find(x => x.id === setId);
  s.jerseys = s.jerseys.filter(j => j.id !== jerseyId);
  save(); renderSets();
}

// ---- PLAYERS ----
function renderPlayers() {
  const el = document.getElementById('players-list');
  if (!db.players.length) {
    el.innerHTML = '<div class="empty-state">Noch keine Spieler. Füge deine Mannschaft hinzu.</div>';
    return;
  }
  const sorted = [...db.players].sort((a,b) => a.name.localeCompare(b.name, 'de'));
  el.innerHTML = `<div class="card"><div>${
    sorted.map(p => {
      const isActive = p.active !== false;
      return `<div class="player-row" style="${isActive ? '' : 'opacity:0.5;'}">
        <div class="player-avatar" style="background:${isActive ? 'var(--accent-bg)' : 'var(--surface-alt)'};">${initials(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${esc(p.name)} <span class="badge ${isActive ? 'badge-green' : ''}" style="${isActive ? '' : 'background:#eee;color:#999;'}">${isActive ? 'Aktiv' : 'Inaktiv'}</span></div>
          <div class="player-meta">Größe: <strong>${p.size}</strong> · Wunschnummer: <strong>${p.preferredNumber || '—'}</strong></div>
          ${(()=>{ const vl = db.lineups.filter(l=>l.playerIds.includes(p.id)).map(l=>l.name); return vl.length ? `<div style="font-size:11px;color:var(--text-muted);margin-top:1px;">Vorlagen: ${vl.map(n=>`<span style="background:#f0f0f0;border-radius:4px;padding:0 5px;">${esc(n)}</span>`).join(' ')}</div>` : ''; })()}
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="toggleActive('${p.id}')">${isActive ? 'Inaktiv setzen' : 'Aktiv setzen'}</button>
          <button class="btn btn-sm" onclick="openEditPlayerModal('${p.id}')">Bearbeiten</button>
          <button class="btn btn-sm btn-danger" onclick="deletePlayer('${p.id}')">Löschen</button>
        </div>
      </div>`;
    }).join('')}
  </div></div>`;
}

function openAddPlayerModal() {
  editPlayerId = null;
  document.getElementById('modal-player-title').textContent = 'Spieler hinzufügen';
  document.getElementById('player-name-input').value = '';
  document.getElementById('player-size-input').value = 'M';
  document.getElementById('player-num-input').value = '';
  openModal('modal-player');
  setTimeout(() => document.getElementById('player-name-input').focus(), 100);
}
function openEditPlayerModal(id) {
  editPlayerId = id;
  const p = db.players.find(x => x.id === id);
  document.getElementById('modal-player-title').textContent = 'Spieler bearbeiten';
  document.getElementById('player-name-input').value = p.name;
  document.getElementById('player-size-input').value = p.size;
  document.getElementById('player-num-input').value = p.preferredNumber || '';
  openModal('modal-player');
}
function savePlayer() {
  const name = document.getElementById('player-name-input').value.trim();
  const size = document.getElementById('player-size-input').value;
  const numRaw = document.getElementById('player-num-input').value;
  const preferredNumber = numRaw ? parseInt(numRaw) : null;
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  if (preferredNumber && (preferredNumber < 1 || preferredNumber > 99)) { alert('Ungültige Wunschnummer (1–99).'); return; }
  if (editPlayerId) {
    const p = db.players.find(x => x.id === editPlayerId);
    Object.assign(p, { name, size, preferredNumber });
  } else {
    db.players.push({ id: uid(), name, size, preferredNumber, active: true });
  }
  save(); closeModal('modal-player'); renderPlayers();
}
function deletePlayer(id) {
  if (!confirm('Spieler wirklich löschen?')) return;
  db.players = db.players.filter(p => p.id !== id);
  selectedPlayers.delete(id);
  save(); renderPlayers();
}

// ---- LINEUP ----
function renderLineup() {
  const sel = document.getElementById('lineup-set-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Trikotsatz auswählen —</option>' +
    db.sets.map(s => `<option value="${s.id}" ${s.id===cur?'selected':''}>${esc(s.name)} (${s.jerseys.length} Trikots)</option>`).join('');
  const vsel = document.getElementById('vorlage-select');
  if (vsel) {
    const vcur = vsel.value;
    vsel.innerHTML = '<option value="">— Vorlage laden —</option>' +
      db.lineups.map(l => `<option value="${l.id}" ${l.id===vcur?'selected':''}>${esc(l.name)} (${l.playerIds.length} Spieler)</option>`).join('');
  }
  onSetSelected();
}
function onSetSelected() {
  const setId = document.getElementById('lineup-set-select').value;
  const previewEl = document.getElementById('set-preview');
  const playersCard = document.getElementById('players-select-card');
  const resultCard = document.getElementById('match-result-card');
  resultCard.style.display = 'none';
  if (!setId) {
    previewEl.innerHTML = '';
    playersCard.style.display = 'none';
    return;
  }
  const s = db.sets.find(x => x.id === setId);
  const sizeCounts = {};
  s.jerseys.forEach(j => sizeCounts[j.size] = (sizeCounts[j.size]||0)+1);
  previewEl.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
    ${SIZES.filter(sz=>sizeCounts[sz]).map(sz=>`<span class="badge badge-blue">${sizeCounts[sz]}× ${sz}</span>`).join('')}
  </div>`;
  playersCard.style.display = 'block';
  const vsel = document.getElementById('vorlage-select');
  if (vsel && vsel.options.length <= 1) {
    vsel.innerHTML = '<option value="">— Vorlage laden —</option>' +
      db.lineups.map(l => `<option value="${l.id}">${esc(l.name)} (${l.playerIds.length} Spieler)</option>`).join('');
  }
  renderPlayerSelect();
}
function renderPlayerSelect() {
  const el = document.getElementById('players-select-list');
  if (!db.players.length) {
    el.innerHTML = '<div class="empty-state" style="padding:1rem;">Noch keine Spieler angelegt.</div>';
    return;
  }
  const q = (document.getElementById('player-search')?.value || '').toLowerCase().trim();
  const statusFilter = document.getElementById('status-filter')?.value || 'alle';
  const sorted = [...db.players].sort((a,b) => a.name.localeCompare(b.name, 'de'));
  let filtered = sorted;
  if (statusFilter === 'aktiv') filtered = filtered.filter(p => p.active !== false);
  if (statusFilter === 'inaktiv') filtered = filtered.filter(p => p.active === false);
  if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state" style="padding:1rem;">Kein Spieler gefunden.</div>';
    return;
  }
  el.innerHTML = filtered.map(p => {
    const isActive = p.active !== false;
    return `<label class="player-checkbox ${selectedPlayers.has(p.id)?'selected':''}">
      <input type="checkbox" ${selectedPlayers.has(p.id)?'checked':''} onchange="togglePlayer('${p.id}',this)">
      <div class="player-avatar" style="width:30px;height:30px;font-size:11px;">${initials(p.name)}</div>
      <div>
        <div style="font-size:14px;font-weight:500;">${esc(p.name)} <span style="font-size:11px;padding:1px 6px;border-radius:10px;font-weight:400;${isActive?'background:#eaf3de;color:#3b6d11;':'background:#eee;color:#888;'}">${isActive?'Aktiv':'Inaktiv'}</span></div>
        <div style="font-size:12px;color:var(--text-muted);">Größe ${p.size}${p.preferredNumber ? ' · Wunsch: #'+p.preferredNumber : ''}</div>
      </div>
    </label>`;
  }).join('');
  updateSelectedCount();
}
function togglePlayer(id, cb) {
  if (cb.checked) selectedPlayers.add(id); else selectedPlayers.delete(id);
  const label = cb.closest('.player-checkbox');
  label.classList.toggle('selected', cb.checked);
  updateSelectedCount();
  document.getElementById('match-result-card').style.display = 'none';
  if (selectedPlayers.size > 0) runMatch();
}
function updateSelectedCount() {
  document.getElementById('selected-count').textContent = selectedPlayers.size + ' Spieler';
}
function selectAll() {
  db.players.forEach(p => selectedPlayers.add(p.id));
  renderPlayerSelect();
  if (selectedPlayers.size > 0) runMatch();
}
function selectNone() {
  selectedPlayers.clear();
  renderPlayerSelect();
  document.getElementById('match-result-card').style.display = 'none';
}

function runMatch() {
  const setId = document.getElementById('lineup-set-select').value;
  if (!setId || selectedPlayers.size === 0) return;
  const s = db.sets.find(x => x.id === setId);
  const players = db.players.filter(p => selectedPlayers.has(p.id));
  const jerseys = s.jerseys.map(j => ({...j, taken: false}));

  const results = [];
  const unmatched = [];

  // Pass 1: preferred number + correct size
  players.forEach(p => {
    if (!p.preferredNumber) return;
    const j = jerseys.find(j => !j.taken && j.number === p.preferredNumber && j.size === p.size);
    if (j) { j.taken = true; results.push({player: p, jersey: j, quality: 'perfect'}); }
  });
  // Pass 2: preferred number + wrong size (fallback)
  players.forEach(p => {
    if (results.find(r => r.player.id === p.id)) return;
    if (!p.preferredNumber) return;
    const j = jerseys.find(j => !j.taken && j.number === p.preferredNumber);
    if (j) { j.taken = true; results.push({player: p, jersey: j, quality: 'num-only'}); }
  });
  // Pass 3: correct size, any number
  players.forEach(p => {
    if (results.find(r => r.player.id === p.id)) return;
    const j = jerseys.find(j => !j.taken && j.size === p.size);
    if (j) { j.taken = true; results.push({player: p, jersey: j, quality: 'size-only'}); }
  });
  // Pass 4: no match
  players.forEach(p => {
    if (!results.find(r => r.player.id === p.id)) unmatched.push(p);
  });

  const perfect = results.filter(r => r.quality==='perfect').length;
  const partial = results.filter(r => r.quality!=='perfect').length;

  document.getElementById('match-result-card').style.display = 'block';
  document.getElementById('match-stats').innerHTML = `
    <div class="stat-card green"><div class="stat-num">${perfect}</div><div class="stat-label">Perfekte Übereinstimmung</div></div>
    <div class="stat-card amber"><div class="stat-num">${partial}</div><div class="stat-label">Teilweise zugeordnet</div></div>
    <div class="stat-card red"><div class="stat-num">${unmatched.length}</div><div class="stat-label">Kein Trikot gefunden</div></div>
  `;

  let html = '';
  if (results.length) {
    html += results.map(r => {
      const isPerfect = r.quality==='perfect';
      const isNumOnly = r.quality==='num-only';
      const jClass = isPerfect ? '' : (isNumOnly ? 'warning-jersey' : 'warning-jersey');
      const badge = isPerfect
        ? '<span class="badge badge-green">Wunsch ✓</span>'
        : isNumOnly
          ? '<span class="badge badge-amber">Wunschnr. · andere Größe</span>'
          : '<span class="badge badge-amber">passende Größe</span>';
      return `<div class="match-row">
        <div class="match-jersey ${jClass}">
          <div class="n">${r.jersey.number}</div>
          <div class="s">${r.jersey.size}</div>
        </div>
        <div style="flex:1;">
          <div style="font-weight:500;font-size:14px;">${esc(r.player.name)}</div>
          <div style="font-size:12px;color:var(--text-muted);">Größe ${r.player.size}${r.player.preferredNumber?' · Wunsch #'+r.player.preferredNumber:''}</div>
        </div>
        ${badge}
      </div>`;
    }).join('');
  }
  if (unmatched.length) {
    html += `<div class="section-divider" style="color:var(--danger);">Kein passendes Trikot</div>`;
    html += unmatched.map(p => `
      <div class="match-row" style="border-color:var(--border-danger,#f7c1c1);">
        <div class="match-jersey none-jersey">
          <div class="n">—</div>
          <div class="s">${p.size}</div>
        </div>
        <div style="flex:1;">
          <div style="font-weight:500;font-size:14px;">${esc(p.name)}</div>
          <div style="font-size:12px;color:var(--text-muted);">Größe ${p.size}${p.preferredNumber?' · Wunsch #'+p.preferredNumber:''}</div>
        </div>
        <span class="badge badge-red">Kein Trikot</span>
      </div>
    `).join('');
  }
  document.getElementById('match-result-list').innerHTML = html;
}

// ---- UTILS ----
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}
// ---- VORLAGEN ----
let editVorlageId = null;

function renderVorlagen() {
  const el = document.getElementById('vorlagen-list');
  if (!db.lineups.length) {
    el.innerHTML = '<div class="empty-state">Noch keine Vorlagen. Lege z.B. „1. Mannschaft" an.</div>';
    return;
  }
  el.innerHTML = db.lineups.map(l => {
    const names = l.playerIds.map(id => db.players.find(p => p.id === id)?.name).filter(Boolean);
    return `<div class="card">
      <div class="card-header">
        <div>
          <strong style="font-size:15px;">${esc(l.name)}</strong>
          <span style="margin-left:8px;" class="badge badge-blue">${names.length} Spieler</span>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="openEditVorlageModal('${l.id}')">Bearbeiten</button>
          <button class="btn btn-sm btn-danger" onclick="deleteVorlage('${l.id}')">Löschen</button>
        </div>
      </div>
      <div style="font-size:13px;color:var(--text-muted);">${names.length ? names.join(', ') : 'Keine Spieler zugeordnet.'}</div>
    </div>`;
  }).join('');
}

function openNewVorlageModal() {
  editVorlageId = null;
  document.getElementById('modal-vorlage-title').textContent = 'Neue Vorlage';
  document.getElementById('vorlage-name-input').value = '';
  renderVorlagePlayerList(new Set());
  openModal('modal-vorlage');
  setTimeout(() => document.getElementById('vorlage-name-input').focus(), 100);
}

function openEditVorlageModal(id) {
  editVorlageId = id;
  const l = db.lineups.find(x => x.id === id);
  document.getElementById('modal-vorlage-title').textContent = 'Vorlage bearbeiten';
  document.getElementById('vorlage-name-input').value = l.name;
  renderVorlagePlayerList(new Set(l.playerIds));
  openModal('modal-vorlage');
}

function renderVorlagePlayerList(selected) {
  const el = document.getElementById('vorlage-player-list');
  const sorted = [...db.players].sort((a,b) => a.name.localeCompare(b.name, 'de'));
  if (!sorted.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text-muted);">Keine Spieler vorhanden.</p>'; return; }
  el.innerHTML = sorted.map(p => `
    <label class="player-checkbox ${selected.has(p.id)?'selected':''}" style="margin-bottom:2px;">
      <input type="checkbox" ${selected.has(p.id)?'checked':''} value="${p.id}" onchange="this.closest('label').classList.toggle('selected',this.checked)">
      <div class="player-avatar" style="width:28px;height:28px;font-size:11px;">${initials(p.name)}</div>
      <span style="font-size:14px;">${esc(p.name)} <span style="color:var(--text-muted);font-size:12px;">${p.size}</span></span>
    </label>
  `).join('');
}

function saveVorlage() {
  const name = document.getElementById('vorlage-name-input').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const playerIds = [...document.querySelectorAll('#vorlage-player-list input[type=checkbox]:checked')].map(cb => cb.value);
  if (editVorlageId) {
    const l = db.lineups.find(x => x.id === editVorlageId);
    l.name = name; l.playerIds = playerIds;
  } else {
    db.lineups.push({ id: uid(), name, playerIds });
  }
  save(); closeModal('modal-vorlage'); renderVorlagen();
}

function deleteVorlage(id) {
  if (!confirm('Vorlage wirklich löschen?')) return;
  db.lineups = db.lineups.filter(l => l.id !== id);
  save(); renderVorlagen();
}

function loadVorlage() {
  const id = document.getElementById('vorlage-select').value;
  if (!id) return;
  const l = db.lineups.find(x => x.id === id);
  if (!l) return;
  selectedPlayers = new Set(l.playerIds.filter(pid => db.players.find(p => p.id === pid)));
  renderPlayerSelect();
  if (selectedPlayers.size > 0) runMatch();
}

// ---- EXPORT / IMPORT ----
function toggleActive(id) {
  const p = db.players.find(x => x.id === id);
  p.active = p.active === false ? true : false;
  save(); renderPlayers();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'trikot-daten-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function exportCSV() {
  const rows = [['Name','Groesse','Wunschnummer','Status']];
  [...db.players].sort((a,b) => a.name.localeCompare(b.name,'de')).forEach(p => {
    rows.push([p.name, p.size, p.preferredNumber || '', p.active === false ? 'inaktiv' : 'aktiv']);
  });
  const csv = rows.map(r => r.join(';')).join('\r\n');
  const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spieler-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function downloadCSVTemplate() {
  const csv = 'Name;Groesse;Wunschnummer;Status\r\nMax Mustermann;M;10;aktiv\r\nErika Musterfrau;L;7;aktiv';
  const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spieler-vorlage.csv';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.sets || !imported.players) { alert('Ungültige JSON-Datei.'); return; }
      if (!imported.lineups) imported.lineups = [];
      if (!confirm(`JSON importieren?\n\n${imported.sets.length} Trikotsätze, ${imported.players.length} Spieler, ${imported.lineups.length} Vorlagen\n\nAktuelle Daten werden überschrieben.`)) return;
      db = imported;
      save(); renderPlayers();
      alert('Import erfolgreich!');
    } catch(err) { alert('Fehler beim Lesen der Datei.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const lines = ev.target.result.replace(/^﻿/, '').split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) { alert('Leere Datei.'); return; }
      const header = lines[0].split(';').map(h => h.trim().toLowerCase());
      const iName = header.indexOf('name');
      const iSize = header.findIndex(h => h.includes('groesse') || h.includes('größe') || h === 'size');
      const iNum  = header.findIndex(h => h.includes('nummer') || h === 'number');
      const iStat = header.findIndex(h => h.includes('status'));
      if (iName < 0 || iSize < 0) { alert('Spalten "Name" und "Groesse" werden benötigt.'); return; }
      const newPlayers = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(';');
        const name = cols[iName]?.trim();
        const size = cols[iSize]?.trim().toUpperCase();
        if (!name || !size) continue;
        const preferredNumber = iNum >= 0 && cols[iNum]?.trim() ? parseInt(cols[iNum]) : null;
        const active = iStat >= 0 ? cols[iStat]?.trim().toLowerCase() !== 'inaktiv' : true;
        const existing = db.players.find(p => p.name.toLowerCase() === name.toLowerCase());
        if (existing) {
          existing.size = size; existing.preferredNumber = preferredNumber; existing.active = active;
        } else {
          newPlayers.push({ id: uid(), name, size, preferredNumber, active });
        }
      }
      db.players.push(...newPlayers);
      save(); renderPlayers();
      alert(`CSV importiert: ${newPlayers.length} neue Spieler hinzugefügt, bestehende aktualisiert.`);
    } catch(err) { alert('Fehler beim Lesen der CSV-Datei.'); }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

function exportSheet(mode) {
  const setId = document.getElementById('lineup-set-select').value;

  const dateVal = document.getElementById('game-date').value;

  const dateStr = dateVal ? new Date(dateVal).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}) : '';

  const resultList = document.getElementById('match-result-list');
  if (!resultList || !resultList.children.length) { alert('Bitte zuerst das Matching durchführen.'); return; }

  const logoEl = document.querySelector('header img');
  const logoSrc = logoEl ? logoEl.src : '';

  const sheet = document.getElementById('export-sheet');
  sheet.style.display = 'block';
  sheet.innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:3px solid #cc0000;">
      ${logoSrc ? `<img src="${logoSrc}" style="height:64px;width:auto;">` : ''}
      <div>
        <div style="font-size:20px;font-weight:700;color:#111;">SG Bliesen-Winterbach</div>
        <div style="font-size:13px;color:#555;margin-top:2px;">Trikot-Aufstellung</div>
      </div>
    </div>
    <div style="display:flex;gap:24px;margin-bottom:20px;font-size:14px;flex-wrap:wrap;">
      ${dateStr ? `<div><span style="color:#888;">Datum:</span> <strong>${dateStr}</strong></div>` : ''}
      ${opponent ? `<div><span style="color:#888;">Gegner:</span> <strong>${opponent}</strong></div>` : ''}
      ${setName ? `<div><span style="color:#888;">Trikot:</span> <strong>${setName}</strong></div>` : ''}
    </div>
    <div>${Array.from(resultList.querySelectorAll('.match-row')).map(row => {
      const num = row.querySelector('.n')?.textContent || '—';
      const sz  = row.querySelector('.s')?.textContent || '';
      const name = row.querySelectorAll('div[style]')[1]?.querySelector('div')?.textContent || '';
      const badge = row.querySelector('.badge')?.textContent || '';
      const isNone = row.querySelector('.none-jersey');
      const isWarn = row.querySelector('.warning-jersey') && !isNone;
      const color = isNone ? '#cc0000' : isWarn ? '#854f0b' : '#3b6d11';
      const bg    = isNone ? '#fdecea'  : isWarn ? '#faeeda'  : '#eaf3de';
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 10px;margin-bottom:4px;border-radius:6px;background:#f8f8f8;">
        <div style="width:44px;height:44px;border-radius:6px;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
          <div style="font-size:18px;font-weight:700;color:${color};">${num}</div>
          <div style="font-size:10px;color:${color};opacity:.8;">${sz}</div>
        </div>
        <div style="flex:1;font-size:14px;font-weight:500;">${name}</div>
        <div style="font-size:12px;padding:2px 8px;border-radius:10px;background:${bg};color:${color};">${badge}</div>
      </div>`;
    }).join('')}</div>
    <div style="margin-top:20px;font-size:11px;color:#aaa;text-align:right;">SG Bliesen-Winterbach · Trikot-Manager</div>`;

  html2canvas(sheet, {scale:2, backgroundColor:'#ffffff', useCORS:true, allowTaint:true}).then(canvas => {
    sheet.style.display = 'none';
    if (mode === 'image') {
      const a = document.createElement('a');
      a.download = 'Aufstellung' + (dateVal?'-'+dateVal:'') + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    } else {
      const {jsPDF} = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
      const w = pdf.internal.pageSize.getWidth();
      const h = canvas.height * w / canvas.width;
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, h);
      pdf.save('Aufstellung' + (dateVal?'-'+dateVal:'') + '.pdf');
    }
  }).catch(()=>{ sheet.style.display='none'; alert('Export fehlgeschlagen. Bitte Matching neu berechnen.'); });
}
